name: Build And Release Desktop App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Build Windows executable
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean WhatsAppBackupReader.spec

      - name: Create release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\WhatsAppBackupReader.exe release\WhatsAppBackupReader.exe
          Compress-Archive -Path release\WhatsAppBackupReader.exe -DestinationPath release\WhatsAppBackupReader-win64.zip -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppBackupReader-windows
          path: |
            release/WhatsAppBackupReader.exe
            release/WhatsAppBackupReader-win64.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: WhatsAppBackupReader-windows
          path: release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/WhatsAppBackupReader.exe
            release/WhatsAppBackupReader-win64.zip
